<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0F4C5C" />
  <meta name="description" content="Video calls with real-time translated voice" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <title>Meetly</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: "#FFFDF5",
            offwhite: "#FAF9F6",
            teal: { DEFAULT: "#0F4C5C", dark: "#0a3a46" },
            ink: "#2D2D2D",
          },
          fontFamily: { sans: ["ui-sans-serif", "system-ui", "Segoe UI", "Roboto", "sans-serif"] },
        },
      },
    };
  </script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { background: #FFFDF5; color: #2D2D2D; }
    video { object-fit: cover; }
  </style>
</head>
<body class="bg-cream text-ink antialiased">
  <div id="root"></div>
  <script src="/meetly-env.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
