<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0F4C5C" />
  <meta name="description" content="Video calls with real-time translated voice" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <title>Meetly</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: "#FFFDF5",
            offwhite: "#FAF9F6",
            teal: { DEFAULT: "#0F4C5C", dark: "#0a3a46" },
            ink: "#2D2D2D",
          },
          fontFamily: { sans: ["ui-sans-serif", "system-ui", "Segoe UI", "Roboto", "sans-serif"] },
        },
      },
    };
  </script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { background: #FFFDF5; color: #2D2D2D; }
    video { object-fit: cover; }
  </style>
</head>
<body class="bg-cream text-ink antialiased">
  <div id="root"></div>
  <!-- Native capture handlers if React onClick does not bind -->
  <script>
    (function () {
      function saveLangsFromDom() {
        var s = document.getElementById("meetly-speak");
        var h = document.getElementById("meetly-hear");
        if (s) sessionStorage.setItem("meetly_speak", s.value);
        if (h) sessionStorage.setItem("meetly_hear", h.value);
      }
      function normalizeJoinCode(input) {
        var str = String(input || "")
          .trim()
          .toUpperCase()
          .replace(/\s+/g, "");
        str = str.replace(/^MEETLY[-\u2013]?/i, "");
        str = str.replace(/[^A-Z0-9-]/g, "");
        return "MEETLY-" + str.slice(0, 12);
      }
      document.addEventListener(
        "click",
        function (e) {
          var t = e.target;
          if (!t || !t.closest) return;
          var joinBtn = t.closest("#meetly-join-btn");
          if (joinBtn) {
            e.stopPropagation();
            e.preventDefault();
            var inp = document.getElementById("meetly-join-input");
            var code = normalizeJoinCode(inp ? inp.value : "");
            if (code.length < 10) {
              alert("Enter a valid code");
              return;
            }
            saveLangsFromDom();
            location.href = "/join?code=" + encodeURIComponent(code);
            return;
          }
          var btn = t.closest("#meetly-create-btn");
          if (!btn) return;
          e.stopPropagation();
          e.preventDefault();
          saveLangsFromDom();
          var hn = document.getElementById("meetly-host-name");
          var name = (hn && hn.value && hn.value.trim()) || "Host";
          sessionStorage.setItem("meetly_display_name", name.slice(0, 64));
          sessionStorage.setItem("meetly_role", "host");
          btn.disabled = true;
          var prev = btn.textContent;
          btn.textContent = "Creating…";
          fetch(new URL("/api/room", location.origin).href, {
            method: "POST",
            headers: { Accept: "application/json" },
          })
            .then(function (r) {
              return r.text().then(function (text) {
                return { r: r, text: text };
              });
            })
            .then(function (x) {
              if (!x.r.ok) throw new Error(x.text.slice(0, 200) || "HTTP " + x.r.status);
              var j = JSON.parse(x.text);
              if (!j.room) throw new Error("No room in response");
              location.assign("/" + j.room);
            })
            .catch(function (err) {
              console.error(err);
              alert(err.message || String(err));
            })
            .then(function () {
              btn.disabled = false;
              btn.textContent = prev;
            });
        },
        true
      );
    })();
  </script>
  <script type="module" src="/app.js"></script>
</body>
</html>
