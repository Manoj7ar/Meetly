<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0F4C5C" />
  <meta name="description" content="Video calls with real-time translated voice" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <title>Meetly</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: "#FFFDF5",
            offwhite: "#FAF9F6",
            teal: { DEFAULT: "#0F4C5C", dark: "#0a3a46" },
            ink: "#2D2D2D",
          },
          fontFamily: { sans: ["ui-sans-serif", "system-ui", "Segoe UI", "Roboto", "sans-serif"] },
        },
      },
    };
  </script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { background: #FFFDF5; color: #2D2D2D; }
    video { object-fit: cover; }
    .glass {
      background: rgba(15, 76, 92, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(15, 76, 92, 0.2);
      box-shadow: 0 4px 16px rgba(15, 76, 92, 0.08), inset 0 1px 0 rgba(255,255,255,0.4);
      transition: all 0.2s ease;
    }
    .glass:hover { background: rgba(15, 76, 92, 0.2); box-shadow: 0 6px 20px rgba(15, 76, 92, 0.12), inset 0 1px 0 rgba(255,255,255,0.5); }
    .glass:active { transform: scale(0.97); }
    .glass-teal {
      background: rgba(15, 76, 92, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(15, 76, 92, 0.4);
      box-shadow: 0 4px 16px rgba(15, 76, 92, 0.25), inset 0 1px 0 rgba(255,255,255,0.18);
      transition: all 0.2s ease;
    }
    .glass-teal:hover { background: rgba(15, 76, 92, 0.88); box-shadow: 0 6px 20px rgba(15, 76, 92, 0.35), inset 0 1px 0 rgba(255,255,255,0.22); }
    .glass-teal:active { transform: scale(0.97); }
    .glass-red {
      background: rgba(185, 28, 28, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(185, 28, 28, 0.35);
      box-shadow: 0 4px 16px rgba(185, 28, 28, 0.2), inset 0 1px 0 rgba(255,255,255,0.15);
      transition: all 0.2s ease;
    }
    .glass-red:hover { background: rgba(185, 28, 28, 0.88); }
    .glass-red:active { transform: scale(0.97); }
    .glass-dark {
      background: rgba(15, 76, 92, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(15, 76, 92, 0.12);
      box-shadow: 0 4px 16px rgba(15, 76, 92, 0.04), inset 0 1px 0 rgba(255,255,255,0.3);
      transition: all 0.2s ease;
    }
    .glass-dark:hover { background: rgba(15, 76, 92, 0.15); }
    .glass-dark:active { transform: scale(0.97); }
  </style>
</head>
<body class="bg-cream text-ink antialiased">
  <div id="root"></div>
  <script src="/meetly-env.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
